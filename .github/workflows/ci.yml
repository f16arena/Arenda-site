name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Quality, performance gate and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SKIP_DEPLOY_MIGRATIONS: "1"
      AUTH_SECRET: ci-auth-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      ROOT_HOST: localhost:3000
      SETUP_SECRET: ci-setup-secret
      CRON_SECRET: ci-cron-secret
      RESEND_API_KEY: ""
      EMAIL_FROM: "Commrent <noreply@example.com>"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: CI performance gate
        run: npm run ci:performance-gate
        env:
          PERF_AUDIT_STRICT: "1"
          PERF_AUDIT_FAIL_SILENT_FALLBACKS: "1"
          PERF_AUDIT_CLIENT_KB: "140"
          PERF_AUDIT_SERVER_KB: "80"
          PERF_AUDIT_TAKE_LIMIT: "150"

      - name: Build
        run: npm run build

  public-web-smoke:
    name: Public web smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SKIP_DEPLOY_MIGRATIONS: "1"
      AUTH_SECRET: ci-auth-secret-change-in-production
      NEXTAUTH_URL: http://127.0.0.1:3000
      ROOT_HOST: 127.0.0.1:3000
      SETUP_SECRET: ci-setup-secret
      CRON_SECRET: ci-cron-secret
      RESEND_API_KEY: ""
      EMAIL_FROM: "Commrent <noreply@example.com>"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database schema
        run: npx prisma db push --accept-data-loss

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public smoke tests
        run: npm run test:e2e:web -- --project=chromium-desktop tests/e2e/public-smoke.spec.ts

  mobile-typecheck:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --prefix mobile

      - name: Typecheck mobile shell
        run: npm --prefix mobile run typecheck
