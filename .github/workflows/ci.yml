name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build:
    name: Quality gates and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SKIP_DEPLOY_MIGRATIONS: "1"
      AUTH_SECRET: ci-auth-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      ROOT_HOST: localhost:3000
      SETUP_SECRET: ci-setup-secret
      CRON_SECRET: ci-cron-secret
      RESEND_API_KEY: ""
      EMAIL_FROM: "Commrent <noreply@example.com>"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: TypeScript
        run: npx tsc --noEmit --pretty false

      - name: Quality audit
        run: npm run quality:audit
        env:
          PERF_AUDIT_STRICT: "1"
          PERF_AUDIT_FAIL_SILENT_FALLBACKS: "1"
          PERF_AUDIT_CLIENT_KB: "140"
          PERF_AUDIT_SERVER_KB: "80"
          PERF_AUDIT_TAKE_LIMIT: "150"

      - name: Build
        run: npm run build
