name: Payment E2E

on:
  workflow_dispatch:

jobs:
  staging-payment-e2e:
    name: Staging payment path
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      RUN_E2E_PAYMENT: "1"
      E2E_ALLOW_DB_WRITE: "1"
      AUTH_SECRET: ci-auth-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      ROOT_HOST: localhost:3000
      SETUP_SECRET: ci-setup-secret
      CRON_SECRET: ci-cron-secret
      RESEND_API_KEY: ""
      EMAIL_FROM: "Commrent <noreply@example.com>"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require staging database
        run: |
          if [ -z "$E2E_DATABASE_URL" ]; then
            echo "Set repository secret E2E_DATABASE_URL to a staging/test database URL."
            exit 1
          fi

      - name: Run payment E2E
        run: npm run test:e2e:payment
